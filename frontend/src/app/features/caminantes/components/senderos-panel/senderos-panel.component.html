<div class="grid mt-2">
  <div *ngFor="let sp of senderos" class="col-12 lg:col-6">
    <p-card [styleClass]="'shadow-2 sendero-' + sp.sendero"
            [style]="{'border-left': '4px solid ' + senderoColors[sp.sendero]?.border}">
      <ng-template pTemplate="header">
        <div class="flex align-items-center justify-content-between p-3"
             [style]="{'background': senderoColors[sp.sendero]?.bg}">
          <div>
            <div class="font-bold text-lg">Sendero {{ sp.sendero }}</div>
            <div class="text-sm text-color-secondary">{{ senderoColors[sp.sendero]?.label }}</div>
          </div>
          <div class="text-right">
            <div class="font-bold text-2xl" [style]="{'color': senderoColors[sp.sendero]?.border}">
              {{ sp.porcentaje }}%
            </div>
            <div class="text-xs text-color-secondary">{{ sp.completados }}/{{ sp.total }} caminos</div>
          </div>
        </div>
      </ng-template>

      <p-progressBar [value]="sp.porcentaje" [showValue]="false"
                     styleClass="mb-3"
                     [style]="{'height': '8px'}"></p-progressBar>

      <div *ngFor="let camino of sp.caminos" class="camino-item">
        <div class="camino-name text-sm">{{ camino.camino }}</div>
        <div class="flex gap-1">
          <div class="etapa-dot" [class.done]="camino.conozco" [class.pending]="!camino.conozco"
               pTooltip="Conozco">C</div>
          <div class="etapa-dot" [class.done]="camino.aplico" [class.pending]="!camino.aplico"
               pTooltip="Aplico">A</div>
          <div class="etapa-dot" [class.done]="camino.comparto" [class.pending]="!camino.comparto"
               pTooltip="Comparto">S</div>
        </div>
        <p-tag *ngIf="camino.completado" value="✓" severity="success" styleClass="ml-1"></p-tag>
      </div>
    </p-card>
  </div>
</div>
