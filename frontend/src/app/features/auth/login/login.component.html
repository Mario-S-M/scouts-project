<div class="login-wrapper">
  <div class="login-card">

    <!-- Logo / Header -->
    <div class="login-header">
      <span class="login-logo">⚜️</span>
      <h1 class="login-title">Comunidad de Caminantes</h1>
      <p class="login-subtitle">SCOUTS MÉXICO</p>
    </div>

    <!-- Form -->
    <div class="login-form">
      <div class="field">
        <label for="email">Correo electrónico</label>
        <span class="p-input-icon-left w-full">
          <i class="pi pi-envelope"></i>
          <input
            id="email"
            type="email"
            pInputText
            class="w-full"
            placeholder="correo@ejemplo.com"
            [(ngModel)]="email"
            (keyup.enter)="login()"
          />
        </span>
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <span class="p-input-icon-left w-full">
          <i class="pi pi-lock"></i>
          <input
            id="password"
            type="password"
            pInputText
            class="w-full"
            placeholder="••••••••"
            [(ngModel)]="password"
            (keyup.enter)="login()"
          />
        </span>
      </div>

      <button
        pButton
        label="Iniciar sesión"
        icon="pi pi-sign-in"
        class="w-full p-button-lg login-btn"
        [loading]="loading"
        (click)="login()"
      ></button>
    </div>

    <div class="login-footer">
      Scouts México &copy; {{ year }}
    </div>
  </div>
</div>
