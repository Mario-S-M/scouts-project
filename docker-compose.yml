version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: scouts_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-scouts_cc}
      POSTGRES_USER: ${DB_USER:-scouts_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-scouts_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - scouts_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-scouts_user} -d ${DB_NAME:-scouts_cc}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scouts_backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-scouts_cc}
      DB_USER: ${DB_USER:-scouts_user}
      DB_PASSWORD: ${DB_PASSWORD:-scouts_pass}
      PORT: 3000
      NODE_ENV: production
      UPLOAD_DIR: /app/uploads
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - scouts_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scouts_frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - scouts_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: scouts_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: a@b.com
      PGADMIN_DEFAULT_PASSWORD: scouts123
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - scouts_network
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
  pgadmin_data:

networks:
  scouts_network:
    driver: bridge
